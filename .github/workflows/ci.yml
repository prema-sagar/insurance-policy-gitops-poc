name: Build, Scan, Push and Deploy

on:
  push:
    branches:
      - main

jobs:

  # ── 1. Build WAR ─────────────────────────────────────────────────────────────
  build-war:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 7.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      - name: Build WAR
        run: gradle clean war

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: build/libs/*.war

  # ── 2. Docker build + Trivy scan + push ──────────────────────────────────────
  build-scan-push:
    runs-on: ubuntu-latest
    needs: build-war
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: build/libs/

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:latest

      - name: Scan Docker Image using Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Version Tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }}

      - name: Push Latest Tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:latest

  # ── 3. Update GitOps repo → ArgoCD auto-syncs ────────────────────────────────
  update-gitops-repo:
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: prema-sagar/insurance-gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: List repo files (debug)
        run: ls -R

      - name: Update Deployment YAML with new image tag
        run: |
          sed -i "s|image: .*/insurance-health-component:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }}|" deployment.yaml
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          git commit -am "Update image tag to ${{ github.run_number }}"
          git push

  # ── 4. BDD Cucumber tests — waits for app to be live, then tests ──────────────
  #
  # No kubectl or ArgoCD needed here.
  # ArgoCD syncs the cluster in the background after Job 3 pushes the git change.
  # We simply poll the health endpoint until the new pod is up and responding,
  # then fire the Cucumber tests against the live app.
  #
  # Only secret needed: APP_BASE_URL (e.g. http://<node-ip>:30080)
  #
  bdd-acceptance-tests:
    runs-on: ubuntu-latest
    needs: update-gitops-repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 7.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      # Poll /InsuranceApp/health until 200.
      # ArgoCD sync + Kubernetes rolling update happens in the background.
      # Liberty takes ~30-60s to start inside the new pod.
      # 40 attempts x 15s = 10 minutes max wait.
      - name: Wait for deployed app to be healthy
        run: |
          echo "Waiting for app at ${{ secrets.APP_BASE_URL }} to be ready..."
          for i in $(seq 1 40); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                   --connect-timeout 5 --max-time 10 \
                   "${{ secrets.APP_BASE_URL }}/InsuranceApp/health" || echo "000")
            echo "Attempt $i — HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✅ App is healthy and ready."
              break
            fi
            if [ "$i" = "40" ]; then
              echo "❌ App did not become healthy within 10 minutes. Failing pipeline."
              exit 1
            fi
            sleep 15
          done

      # Run all Cucumber BDD scenarios against the live deployed app
      - name: Run BDD Cucumber Acceptance Tests
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: gradle acceptanceTest

      - name: Upload Cucumber HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-${{ github.run_number }}
          path: build/cucumber-reports/

      - name: Upload Cucumber JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-json-${{ github.run_number }}
          path: build/cucumber-reports/cucumber.json
