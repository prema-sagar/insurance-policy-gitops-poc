name: Build, Scan and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-war:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 7.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      - name: Build WAR
        run: gradle clean war

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: build/libs/*.war

  build-docker-image:
    runs-on: ubuntu-latest
    needs: build-war

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-war
          path: build/libs/

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }} .

          docker tag \
            ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:latest

      - name: Verify Docker Images
        run: docker images

      - name: Save Docker Image
        run: docker save ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }} -o insurance-image.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: insurance-image.tar

  scan-docker-image:
    runs-on: ubuntu-latest
    needs: build-docker-image

    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i insurance-image.tar

      - name: Verify Loaded Docker Images
        run: docker images

      - name: Scan Docker Image using Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: scan-docker-image

    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i insurance-image.tar

      - name: Recreate Latest Tag
        run: |
          docker tag \
            ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:latest

      - name: Verify Docker Images Before Push
        run: docker images

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Version Tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }}

      - name: Push Latest Tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:latest