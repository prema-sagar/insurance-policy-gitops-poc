name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build WAR
        # 'war' task compiles the app and produces build/libs/insurance-health-component.war
        run: ./gradlew clean war

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        # Dockerfile downloads derby.jar from Maven Central during this step.
        # No external services or docker-compose needed.
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:latest