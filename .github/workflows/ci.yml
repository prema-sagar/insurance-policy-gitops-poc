name: Build, Scan and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 7.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      - name: Build WAR
        run: gradle clean war

      - name: Run Unit Tests
        run: gradle test

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:latest

      - name: Scan Docker Image using Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image Version Tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:${{ github.run_number }}

      - name: Push Docker Image Latest Tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component:latest