name: CI Build, Docker image and WSDL check

on:
  push:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component
      CONTAINER_NAME: insurance
      WSDL_PATH: "/insurance/HealthPolicySoapService?wsdl"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build WAR with Gradle (using Gradle Docker image)
        # Use the official Gradle Docker image to run the build without requiring a wrapper
        run: |
          docker run --rm -v "${{ github.workspace }}":/workspace -w /workspace gradle:jdk17 gradle clean build --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: docker.io/${{ env.IMAGE }}:latest

      - name: Run container for smoke test
        run: |
          docker rm -f $CONTAINER_NAME || true
          docker run -d --name $CONTAINER_NAME -p 9080:9080 docker.io/${IMAGE}:latest

      - name: Wait for WSDL and print first lines
        run: |
          set -o pipefail
          echo "Waiting for WSDL at http://localhost:9080${WSDL_PATH} ..."
          ATTEMPTS=0
          until curl -sS --max-time 5 "http://localhost:9080${WSDL_PATH}" -o wsdl.xml; do
            ATTEMPTS=$((ATTEMPTS+1))
            if [ "$ATTEMPTS" -ge 30 ]; then
              echo "WSDL not available after $ATTEMPTS attempts" >&2
              docker logs $CONTAINER_NAME --tail 200 || true
              exit 1
            fi
            echo "Waiting for server to start... ($ATTEMPTS)"
            sleep 5
          done
          echo "WSDL fetched — first 200 chars:"
          head -c 200 wsdl.xml || true

      - name: Tear down container
        if: always()
        run: |
          docker rm -f $CONTAINER_NAME || true
