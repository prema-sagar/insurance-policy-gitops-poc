name: CI Build, Docker image and WSDL check

on:
  push:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/insurance-health-component
      CONTAINER_NAME: insurance
      # Try several likely WSDL paths if the app uses a different context root
      WSDL_PATHS: "/insurance/HealthPolicySoapService?wsdl /insurance-health-component/HealthPolicySoapService?wsdl /insurance/HealthPolicySoapServiceImpl?wsdl /insurance-health-component/HealthPolicySoapServiceImpl?wsdl"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build WAR with Gradle (using Gradle Docker image)
        # Use the official Gradle Docker image to run the build without requiring a wrapper
        run: |
          docker run --rm -v "${{ github.workspace }}":/workspace -w /workspace gradle:jdk17 gradle clean build --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: docker.io/${{ env.IMAGE }}:latest

      - name: Run container for smoke test
        run: |
          docker rm -f $CONTAINER_NAME || true
          docker run -d --name $CONTAINER_NAME -p 9080:9080 docker.io/${IMAGE}:latest

      - name: Wait for WSDL and print first lines
        run: |
          set -o pipefail
          echo "Trying WSDL paths: $WSDL_PATHS"
          # Ensure curl is available on the runner (some minimal images may not have it)
          sudo apt-get update && sudo apt-get install -y curl || true
          ATTEMPTS=0
          SUCCESS=0
          for PATH in $WSDL_PATHS; do
            echo "Checking path: $PATH"
            ATTEMPTS=0
            while [ $ATTEMPTS -lt 30 ]; do
              if curl -sS --max-time 5 "http://localhost:9080${PATH}" -o wsdl.xml; then
                echo "Successfully fetched WSDL from $PATH"
                SUCCESS=1
                break 2
              fi
              ATTEMPTS=$((ATTEMPTS+1))
              echo "Waiting for server to start... (attempt $ATTEMPTS) for path $PATH"
              sleep 5
            done
            echo "Path $PATH timed out, trying next path..."
          done
          if [ $SUCCESS -ne 1 ]; then
            echo "WSDL not available after trying all paths" >&2
            docker logs $CONTAINER_NAME --tail 200 || true
            exit 1
          fi
          echo "WSDL fetched — first 200 chars:"
          head -c 200 wsdl.xml || true

      - name: Upload WSDL artifact
        uses: actions/upload-artifact@v4
        with:
          name: wsdl-xml
          path: wsdl.xml

      - name: Tear down container
        if: always()
        run: |
          docker rm -f $CONTAINER_NAME || true
